name: CI - MLflow Training Pipeline (Lufthi Arief Syabana)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'Workflow-CI/MLProject/**'
  schedule:
    - cron: '0 8 * * 1'

jobs:
  train-and-docker:
    name: Train Model and Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas==2.2.2 numpy==1.26.4 \
            scikit-learn==1.5.1 matplotlib==3.9.2 seaborn==0.13.2 joblib==1.4.2

      - name: Run MLflow Project
        run: |
          cd Workflow-CI/MLProject
          MLFLOW_TRACKING_URI=mlruns mlflow run . \
            --env-manager local \
            --experiment-name Smartphone_Addiction_CI \
            -P n_estimators=100 \
            -P max_depth=10 \
            -P random_state=42

      - name: Verify Output
        run: |
          echo "=== Model output ==="
          ls -lh Workflow-CI/MLProject/model_output/
          echo "Run ID: $(cat Workflow-CI/MLProject/model_output/run_id.txt)"
          ls -lh Workflow-CI/MLProject/artifacts_ci/

      - name: Upload Artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts-${{ github.run_number }}
          path: |
            Workflow-CI/MLProject/model_output/
            Workflow-CI/MLProject/artifacts_ci/
          retention-days: 30

      - name: Commit Artifacts to Repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          mkdir -p model_artifacts
          cp -r Workflow-CI/MLProject/model_output/ model_artifacts/ 2>/dev/null || true
          cp -r Workflow-CI/MLProject/artifacts_ci/ model_artifacts/ 2>/dev/null || true
          git add model_artifacts/
          git diff --staged --quiet || git commit -m "ci: update model artifacts run #${{ github.run_number }} [skip ci]"

      - name: Push to Repository
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image via MLflow
        run: |
          RUN_ID=$(cat Workflow-CI/MLProject/model_output/run_id.txt)
          echo "Building Docker for Run ID: $RUN_ID"
          cd Workflow-CI/MLProject
          MLFLOW_TRACKING_URI=mlruns mlflow models build-docker \
            --model-uri "runs:/${RUN_ID}/model" \
            --name "${{ secrets.DOCKERHUB_USERNAME }}/smartphone-addiction-ml"

      - name: Push to Docker Hub
        run: |
          docker tag \
            ${{ secrets.DOCKERHUB_USERNAME }}/smartphone-addiction-ml:latest \
            ${{ secrets.DOCKERHUB_USERNAME }}/smartphone-addiction-ml:run-${{ github.run_number }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/smartphone-addiction-ml:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/smartphone-addiction-ml:run-${{ github.run_number }}
          echo "Docker image pushed successfully"
